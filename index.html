<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NunzioDiet — Substituição de Alimentos</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green: #62C823;
      --green-dark: #4DA819;
      --green-xdark: #3C8513;
      --green-light: #C8F09A;
      --green-bg: #F4F4F4;
      --charcoal: #2B2B2B;
      --purple: #7c3aed;
      --purple-light: #ddd6fe;
      --border: #D4EFC0;
      --text: #2B2B2B;
      --text-muted: #6b7280;
      --card-shadow: 0 4px 24px rgba(98,200,35,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--green-bg);
      color: var(--charcoal);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--green);
      padding: 40px 24px 36px;
      text-align: center;
      color: var(--charcoal);
    }
    .header-inner { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 10px; }
    .logo { font-size: 2.4rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
    .logo em { font-style: normal; color: var(--charcoal); }
    .logo span { font-style: normal; color: white; }
    .tagline { font-size: 0.95rem; color: var(--charcoal); opacity: .75; font-weight: 500; letter-spacing: .5px; }

    /* ── Layout ── */
    .container { max-width: 840px; margin: 0 auto; padding: 36px 16px 60px; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 48px 1fr;
      gap: 12px;
      align-items: start;
      margin-bottom: 20px;
    }
    @media (max-width: 580px) {
      .grid-2 { grid-template-columns: 1fr; }
      .arrow-col { transform: rotate(90deg); padding: 4px 0; }
    }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      border: 1.5px solid var(--border);
    }

    .chip {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .chip-a { background: #e0f8c8; color: var(--green-xdark); }
    .chip-b { background: var(--purple-light); color: var(--purple); }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }

    .ac-wrap { position: relative; }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      color: #111827;
      background: #fafafa;
    }
    input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(98,200,35,.18); background: white; }
    input.error { border-color: #ef4444; }

    .dropdown {
      position: absolute;
      top: calc(100% + 2px);
      left: 0; right: 0;
      background: white;
      border: 1.5px solid var(--green-light);
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      display: none;
    }
    .dropdown.open { display: block; }
    .dd-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.88rem;
      border-bottom: 1px solid #f3f4f6;
      transition: background .12s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item.hi { background: #f2fde8; }
    .dd-item .dd-cal { font-size: 0.75rem; color: var(--text-muted); }
    .dd-empty { padding: 12px 14px; font-size: 0.85rem; color: var(--text-muted); }

    /* Arrow divider */
    .arrow-col {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 56px;
      font-size: 1.6rem;
      color: var(--charcoal);
      opacity: .45;
    }

    /* ── Button ── */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: var(--charcoal);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .5px;
      text-transform: uppercase;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(43,43,43,.35); }
    .btn:active { transform: none; }

    /* ── Results ── */
    #results { margin-top: 28px; }

    .res-card {
      background: linear-gradient(135deg, var(--charcoal) 0%, #3a3a3a 100%);
      border-radius: 18px;
      padding: 28px;
      color: white;
      margin-bottom: 16px;
      animation: up .35s ease;
    }
    .res-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; opacity: .65; margin-bottom: 16px; }
    .res-line { font-size: 1rem; line-height: 1.7; }
    .res-big { font-size: 2.2rem; font-weight: 900; color: var(--green); line-height: 1.1; margin: 8px 0; }
    .res-kcal { font-size: 0.82rem; opacity: .75; margin-top: 10px; }

    /* ── Macro card ── */
    .macro-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      border: 1.5px solid var(--border);
      margin-bottom: 16px;
      animation: up .35s ease .08s both;
    }
    .macro-heading {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }
    .legend { display: flex; gap: 20px; margin-bottom: 20px; }
    .leg { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; font-weight: 600; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-a { background: var(--green); }

    .dot-b { background: var(--purple); }

    .m-row { margin-bottom: 18px; }
    .m-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .m-name { font-size: 0.85rem; font-weight: 600; }
    .m-vals { font-size: 0.8rem; color: var(--text-muted); }
    .m-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .bar-bg { background: #f3f4f6; border-radius: 99px; height: 9px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }
    .fill-a { background: var(--green); }

    .fill-b { background: var(--purple); }

    /* ── Note ── */
    .note {
      background: #fffbeb;
      border: 1.5px solid #fcd34d;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 0.85rem;
      color: #92400e;
      line-height: 1.6;
      animation: up .35s ease .16s both;
    }
    .note strong { display: block; margin-bottom: 4px; color: #78350f; }

    .hidden { display: none !important; }
    @keyframes up { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:none; } }

    /* scrollbar */
    .dropdown::-webkit-scrollbar { width: 6px; }
    .dropdown::-webkit-scrollbar-track { background: transparent; }
    .dropdown::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 99px; }
  </style>
</head>

    </div>

  </div>

      <div class="res-line"><span id="r-qA"></span> de <strong id="r-nA"></strong></div>

    </div>

    <div class="macro-card">
      <div class="macro-heading">Comparação de macronutrientes</div>
      <div class="legend">
        <div class="leg"><div class="dot dot-a"></div><span id="leg-a"></span></div>
        <div class="leg"><div class="dot dot-b"></div><span id="leg-b"></span></div>
      </div>
      <div id="macroRows"></div>
    </div>

    <div class="note" id="noteBox"></div>

  </div>
</div>

// ── Autocomplete
function setupAC(inputId, dropdownId) {
  const inp = document.getElementById(inputId);
  const dd  = document.getElementById(dropdownId);
  let hi = -1, selected = null;

  inp.addEventListener('input', () => {
    const q = inp.value.trim().toLowerCase();
    selected = null;
    if (!q) { dd.classList.remove('open'); return; }

    const matches = DB.filter(f => f.name.toLowerCase().includes(q)).slice(0, 10);
    if (!matches.length) {
      dd.innerHTML = `<div class="dd-empty">Nenhum alimento encontrado</div>`;
    } else {
      dd.innerHTML = matches.map((f, i) =>
        `<div class="dd-item" data-idx="${i}" data-name="${f.name}">
          ${f.name}
          <span class="dd-cal">${f.cal} kcal / 100 g</span>
        </div>`
      ).join('');
      dd.querySelectorAll('.dd-item').forEach(el => {
        el.addEventListener('mousedown', e => e.preventDefault());
        el.addEventListener('click', () => {
          inp.value = el.dataset.name;
          selected = DB.find(f => f.name === el.dataset.name);
          dd.classList.remove('open');
          inp.classList.remove('error');
        });
      });
    }
    hi = -1;
    dd.classList.add('open');
  });

  inp.addEventListener('keydown', e => {
    const items = dd.querySelectorAll('.dd-item');
    if (e.key === 'ArrowDown') { hi = Math.min(hi+1, items.length-1); highlight(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { hi = Math.max(hi-1, 0); highlight(items); e.preventDefault(); }
    else if (e.key === 'Enter' && hi >= 0) { items[hi].click(); }
    else if (e.key === 'Escape') { dd.classList.remove('open'); }
  });

  function highlight(items) {
    items.forEach((el, i) => el.classList.toggle('hi', i === hi));
  }

  inp.addEventListener('blur', () => setTimeout(() => dd.classList.remove('open'), 150));

  return { getFood: () => selected || DB.find(f => f.name.toLowerCase() === inp.value.trim().toLowerCase()) };
}

const acA = setupAC('foodA', 'ddA');
const acB = setupAC('foodB', 'ddB');

// ── Calculation
function calculate() {
  const fA = acA.getFood();
  const fB = acB.getFood();
  const qA = parseFloat(document.getElementById('qtyA').value);

  let ok = true;
  if (!fA) { document.getElementById('foodA').classList.add('error'); ok = false; }
  if (!fB) { document.getElementById('foodB').classList.add('error'); ok = false; }
  if (!qA || qA <= 0) { document.getElementById('qtyA').classList.add('error'); ok = false; }
  if (!ok) return;

  document.getElementById('foodA').classList.remove('error');
  document.getElementById('foodB').classList.remove('error');
  document.getElementById('qtyA').classList.remove('error');

  const kcalTotal = (qA / 100) * fA.cal;
  const qB = (kcalTotal / fB.cal) * 100;

  // Macros for the actual quantities
  const mA = calcMacros(fA, qA);
  const mB = calcMacros(fB, qB);

  // ── Fill result card
  document.getElementById('r-qA').textContent = fmt(qA) + ' g';
  document.getElementById('r-nA').textContent = fA.name;
  document.getElementById('r-qB').textContent = fmt(qB) + ' g';
  document.getElementById('r-nB').textContent = fB.name;
  document.getElementById('r-kcal').textContent =
    `Ambas as porções têm aproximadamente ${Math.round(kcalTotal)} kcal`;

  // ── Legend
  document.getElementById('leg-a').textContent = `${fmt(qA)}g ${fA.name}`;
  document.getElementById('leg-b').textContent = `${fmt(qB)}g ${fB.name}`;

  // ── Macro bars
  const macros = [
    { label:'Calorias', unit:'kcal', a: mA.cal, b: mB.cal },
    { label:'Proteína', unit:'g',    a: mA.prot,b: mB.prot },
    { label:'Carboidratos', unit:'g',a: mA.carb,b: mB.carb },
    { label:'Gordura', unit:'g',     a: mA.fat, b: mB.fat  },
    { label:'Fibras',  unit:'g',     a: mA.fib, b: mB.fib  },
  ];

  const rows = document.getElementById('macroRows');
  rows.innerHTML = macros.map(m => {
    const max = Math.max(m.a, m.b, 0.1);
    const pA = (m.a / max * 100).toFixed(1);
    const pB = (m.b / max * 100).toFixed(1);
    return `
      <div class="m-row">
        <div class="m-top">
          <span class="m-name">${m.label}</span>
          <span class="m-vals" style="color:#22c55e">${m.a.toFixed(1)} ${m.unit}</span>
          <span style="font-size:.75rem;color:#aaa;padding:0 4px">vs</span>
          <span class="m-vals" style="color:#7c3aed">${m.b.toFixed(1)} ${m.unit}</span>
        </div>
        <div class="m-bars">
          <div class="bar-bg"><div class="bar-fill fill-a" style="width:${pA}%"></div></div>
          <div class="bar-bg"><div class="bar-fill fill-b" style="width:${pB}%"></div></div>
        </div>
      </div>`;
  }).join('');

  // ── Note
  const notes = [];
  const protDiff = mB.prot - mA.prot;
  const carbDiff = mB.carb - mA.carb;
  if (Math.abs(protDiff) > 5)
    notes.push(protDiff > 0
      ? `⬆ O substituto tem ${protDiff.toFixed(1)}g a mais de proteína — ótimo para preservar massa muscular.`
      : `⬇ O substituto tem ${Math.abs(protDiff).toFixed(1)}g a menos de proteína. Considere complementar com outra fonte proteica.`);
  if (Math.abs(carbDiff) > 10)
    notes.push(carbDiff > 0
      ? `⬆ O substituto tem ${carbDiff.toFixed(1)}g a mais de carboidratos.`
      : `⬇ O substituto tem ${Math.abs(carbDiff).toFixed(1)}g a menos de carboidratos — pode ser interessante para dietas low-carb.`);
  if (qB > qA * 1.5)
    notes.push(`📦 Você pode comer ${fmt(qB)}g do substituto — uma porção bem maior, ótimo para saciar mais!`);
  if (qB < qA * 0.6)
    notes.push(`⚠ O substituto é bem mais calórico: a porção equivalente é bem menor (${fmt(qB)}g). Atenção na medição.`);

  const noteBox = document.getElementById('noteBox');
  if (notes.length) {
    noteBox.innerHTML = `<strong>Observações:</strong>` + notes.map(n => `<div style="margin-top:4px">${n}</div>`).join('');
    noteBox.classList.remove('hidden');
  } else {
    noteBox.classList.add('hidden');
  }

  document.getElementById('results').classList.remove('hidden');
  document.getElementById('results').scrollIntoView({ behavior:'smooth', block:'start' });
}

function calcMacros(food, qty) {
  const r = qty / 100;
  return {
    cal:  +(food.cal  * r).toFixed(1),
    prot: +(food.prot * r).toFixed(1),
    carb: +(food.carb * r).toFixed(1),
    fat:  +(food.fat  * r).toFixed(1),
    fib:  +(food.fib  * r).toFixed(1),
  };
}

function fmt(n) {
  return n % 1 === 0 ? n.toFixed(0) : n.toFixed(1);
}

// Enter key on quantity triggers calc
document.getElementById('qtyA').addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});
</script>
</body>
